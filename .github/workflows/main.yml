name: Bot iLovePrive SEO

on:
  schedule:
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    # FIX CRÍTICO: sem este timeout, uma Action presa (ex: Firebase sem process.exit)
    # consome horas de minutos gratuitos silenciosamente. 8 minutos é mais que suficiente.
    timeout-minutes: 8
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependências
        run: npm install

      - name: Rodar o Robô
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          BLOGGER_CLIENT_ID: ${{ secrets.BLOGGER_CLIENT_ID }}
          BLOGGER_CLIENT_SECRET: ${{ secrets.BLOGGER_CLIENT_SECRET }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
          STRIPCASH_USER_ID: ${{ secrets.STRIPCASH_USER_ID }}
          BLOG_ID: ${{ secrets.BLOG_ID }}
        run: node index.js
